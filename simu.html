<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>µT-Cal 3D方塊對比展示模擬 (無死角版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b1120; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* HUD 面板樣式：增加透明度以降低視覺阻礙 */
        .glow-text { text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .panel-blur { 
            background: rgba(15, 23, 42, 0.65); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        /* 確保數值不會因寬度縮小而換行 */
        .data-row { white-space: nowrap; }
    </style>
</head>
<body>

    <!-- 3D Canvas 容器 -->
    <div id="canvas-container"></div>

    <!-- UI 疊加層 (改為 Absolute HUD 佈局) -->
    <div id="ui-layer">
        
        <!-- 頂部控制台 (釘在上方) -->
        <div class="absolute top-4 left-4 right-4 md:left-8 md:right-8 panel-blur p-4 rounded-xl pointer-events-auto shadow-lg flex flex-col xl:flex-row justify-between items-center gap-4 z-20">
            <div>
                <h1 class="text-xl md:text-2xl font-bold tracking-wider text-blue-400 glow-text">µT-Cal 即時神經網路陀螺儀校正</h1>
                <p class="text-xs text-slate-400 mt-1 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    STM32N6570-DK / µT-Kernel 3.0 / INT8 MLP (5.5K Params)
                </p>
            </div>
            
            <!-- 控制按鈕 -->
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="triggerAction('static')" class="px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-slate-200 rounded text-sm transition-all border border-slate-600 hover:border-blue-400 hover:shadow-[0_0_10px_rgba(96,165,250,0.5)]">
                    ⏸️ 1. 靜態置放
                </button>
                <button onclick="triggerAction('rotate90')" class="px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-slate-200 rounded text-sm transition-all border border-slate-600 hover:border-blue-400 hover:shadow-[0_0_10px_rgba(96,165,250,0.5)]">
                    🔄 2. 精準 90°
                </button>
                <button onclick="triggerAction('random')" class="px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-slate-200 rounded text-sm transition-all border border-slate-600 hover:border-blue-400 hover:shadow-[0_0_10px_rgba(96,165,250,0.5)]">
                    🔀 3. 複雜軌跡
                </button>
                <button onclick="triggerAction('reset')" class="px-4 py-2 bg-red-950/80 hover:bg-red-900 text-red-200 rounded text-sm transition-all border border-red-800 hover:border-red-400 ml-1">
                    ⏹️ 歸零重置
                </button>
            </div>
        </div>

        <!-- 圖例說明 (釘在頂部控制台下方中央) -->
        <div class="absolute top-24 left-1/2 transform -translate-x-1/2 pointer-events-none z-20">
            <div class="panel-blur px-5 py-1.5 rounded-full flex gap-4 text-xs md:text-sm font-medium shadow-md">
                <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 bg-white opacity-80 rounded-sm"></span> 物理基準 (Ground Truth)</span>
                <span class="flex items-center gap-1.5 text-red-400"><span class="w-2.5 h-2.5 border-2 border-red-500 rounded-sm"></span> 原始感測器 (Drift)</span>
                <span class="flex items-center gap-1.5 text-green-400"><span class="w-2.5 h-2.5 border-2 border-green-500 rounded-sm"></span> µT-Cal 校正</span>
            </div>
        </div>

        <!-- 左下角：原始數據面板 -->
        <div class="absolute bottom-6 left-4 md:left-8 w-[280px] md:w-[320px] panel-blur p-4 md:p-5 rounded-xl border-l-4 border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.1)] pointer-events-auto z-20">
            <div class="flex justify-between items-end border-b border-slate-700 pb-2 mb-3">
                <h2 class="text-lg md:text-xl font-bold text-red-400">原始數據</h2>
                <span id="raw-status" class="text-[10px] px-1.5 py-0.5 bg-red-950 text-red-300 rounded font-mono animate-pulse">DRIFTING...</span>
            </div>
            <div class="space-y-2 font-mono text-sm">
                <div class="flex justify-between items-center bg-slate-800/40 p-1.5 rounded data-row">
                    <span class="text-slate-400 text-xs">X (Roll)</span> 
                    <div class="text-right flex items-center gap-3">
                        <div id="err-x" class="text-red-400/80 text-[10px] w-14">+0.00°</div>
                        <div id="raw-x" class="text-white font-bold w-14 text-right">0.00°</div>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-slate-800/40 p-1.5 rounded data-row">
                    <span class="text-slate-400 text-xs">Y (Yaw)</span> 
                    <div class="text-right flex items-center gap-3">
                        <div id="err-y" class="text-red-400/80 text-[10px] w-14">+0.00°</div>
                        <div id="raw-y" class="text-white font-bold w-14 text-right">0.00°</div>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-slate-800/40 p-1.5 rounded data-row">
                    <span class="text-slate-400 text-xs">Z (Pitch)</span> 
                    <div class="text-right flex items-center gap-3">
                        <div id="err-z" class="text-red-400/80 text-[10px] w-14">+0.00°</div>
                        <div id="raw-z" class="text-white font-bold w-14 text-right">0.00°</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右下角：AI校正數據面板 -->
        <div class="absolute bottom-6 right-4 md:right-8 w-[280px] md:w-[320px] panel-blur p-4 md:p-5 rounded-xl border-r-4 border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.1)] pointer-events-auto z-20">
            <div class="flex justify-between items-end border-b border-slate-700 pb-2 mb-3 flex-row-reverse">
                <h2 class="text-lg md:text-xl font-bold text-green-400">µT-Cal 校正</h2>
                <span class="text-[10px] px-1.5 py-0.5 bg-green-900/40 text-green-300 rounded font-mono">STABLE</span>
            </div>
            <div class="space-y-2 font-mono text-sm">
                <div class="flex justify-between items-center bg-slate-800/40 p-1.5 rounded data-row flex-row-reverse">
                    <span class="text-slate-400 text-xs">X (Roll)</span> 
                    <div class="text-left flex items-center gap-3 flex-row-reverse">
                        <div id="cal-err-x" class="text-green-400/80 text-[10px] w-14 text-right">+0.00°</div>
                        <div id="cal-x" class="text-white font-bold w-14 text-left">0.00°</div>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-slate-800/40 p-1.5 rounded data-row flex-row-reverse">
                    <span class="text-slate-400 text-xs">Y (Yaw)</span> 
                    <div class="text-left flex items-center gap-3 flex-row-reverse">
                        <div id="cal-err-y" class="text-green-400/80 text-[10px] w-14 text-right">+0.00°</div>
                        <div id="cal-y" class="text-white font-bold w-14 text-left">0.00°</div>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-slate-800/40 p-1.5 rounded data-row flex-row-reverse">
                    <span class="text-slate-400 text-xs">Z (Pitch)</span> 
                    <div class="text-left flex items-center gap-3 flex-row-reverse">
                        <div id="cal-err-z" class="text-green-400/80 text-[10px] w-14 text-right">+0.00°</div>
                        <div id="cal-z" class="text-white font-bold w-14 text-left">0.00°</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === Three.js 初始化 ===
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0b1120, 0.04);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // 關鍵修改 1：攝影機往後拉、往上提，並往下看
        camera.position.set(0, 3.5, 9); 
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
        
        const ghostMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0.15, 
            roughness: 0.2, metalness: 0.8, side: THREE.DoubleSide
        });
        const ghostLeft = new THREE.Mesh(geometry, ghostMaterial);
        const ghostRight = new THREE.Mesh(geometry, ghostMaterial);
        
        // 關鍵修改 2：方塊往上移動 (y=1.2)，且往兩側稍微拉開，避開底部 UI
        const X_OFFSET = 3.2;
        const Y_OFFSET = 1.2;
        
        ghostLeft.position.set(-X_OFFSET, Y_OFFSET, 0);
        ghostRight.position.set(X_OFFSET, Y_OFFSET, 0);
        scene.add(ghostLeft);
        scene.add(ghostRight);

        function createWireframeCube(colorHex, posX, posY) {
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: colorHex, linewidth: 2 });
            const wireframe = new THREE.LineSegments(edges, lineMat);
            wireframe.position.set(posX, posY, 0);
            scene.add(wireframe);
            return wireframe;
        }

        const rawCube = createWireframeCube(0xff3333, -X_OFFSET, Y_OFFSET);
        const calCube = createWireframeCube(0x33ff33, X_OFFSET, Y_OFFSET);

        // 調整網格位置做為視覺底部參考
        const gridHelper = new THREE.GridHelper(30, 30, 0x1e293b, 0x0f172a);
        gridHelper.position.y = -1.5;
        scene.add(gridHelper);

        // === 物理與感測器模擬變數 ===
        let physicalRot = { x: 0, y: 0, z: 0 };
        let targetRot = { x: 0, y: 0, z: 0 };   
        let dynamicBias = { x: 0.0001, y: 0.0003, z: 0.00005 }; 
        let rawError = { x: 0, y: 0, z: 0 };    
        let calError = { x: 0, y: 0, z: 0 };    
        let currentAction = 'static';
        let isRandomMoving = false;
        let animationTime = 0; 

        // === 操控邏輯 ===
        window.triggerAction = function(action) {
            currentAction = action;
            isRandomMoving = false;
            document.getElementById('raw-status').innerText = action === 'static' ? 'STATIC DRIFT' : 'MOTION TRACKING';

            if (action === 'static') { targetRot = { x: 0, y: 0, z: 0 }; } 
            else if (action === 'rotate90') { targetRot = { x: 0, y: Math.PI / 2, z: 0 }; } 
            else if (action === 'random') {
                isRandomMoving = true;
                animationTime = 0; 
                setTimeout(() => {
                    isRandomMoving = false; 
                    targetRot = { x: 0, y: 0, z: 0 };
                }, 5000);
            }
            else if (action === 'reset') {
                physicalRot = { x: 0, y: 0, z: 0 };
                targetRot = { x: 0, y: 0, z: 0 };
                dynamicBias = { x: 0.0001, y: 0.0003, z: 0.00005 };
                rawError = { x: 0, y: 0, z: 0 };
                calError = { x: 0, y: 0, z: 0 };
            }
        };

        function normalizeAngle(rad) {
            let deg = rad * 180 / Math.PI;
            deg = deg % 360;
            if (deg > 180) deg -= 360;
            if (deg < -180) deg += 360;
            return deg;
        }

        function formatDeg(deg) { return deg.toFixed(2) + '°'; }
        function formatErr(err) { return (err > 0 ? '+' : '') + err.toFixed(2) + '°'; }

        // === 主渲染循環 ===
        function animate() {
            requestAnimationFrame(animate);

            if (isRandomMoving) {
                animationTime += 0.015;
                targetRot.x = Math.sin(animationTime * 2.1) * 0.5 + Math.cos(animationTime * 0.8) * 0.2;
                targetRot.y = Math.sin(animationTime * 1.5) * Math.PI * 0.8; 
                targetRot.z = Math.cos(animationTime * 1.8) * 0.5;
            }

            physicalRot.x += (targetRot.x - physicalRot.x) * 0.08;
            physicalRot.y += (targetRot.y - physicalRot.y) * 0.08;
            physicalRot.z += (targetRot.z - physicalRot.z) * 0.08;

            dynamicBias.x += (Math.random() - 0.5) * 0.00002;
            dynamicBias.y += (Math.random() - 0.5) * 0.00005; 
            dynamicBias.z += (Math.random() - 0.5) * 0.00002;

            rawError.x += dynamicBias.x;
            rawError.y += dynamicBias.y;
            rawError.z += dynamicBias.z;

            calError.x += dynamicBias.x * 0.07; 
            calError.y += dynamicBias.y * 0.07;
            calError.z += dynamicBias.z * 0.07;

            ghostLeft.rotation.set(physicalRot.x, physicalRot.y, physicalRot.z);
            ghostRight.rotation.set(physicalRot.x, physicalRot.y, physicalRot.z);

            rawCube.rotation.set(physicalRot.x + rawError.x, physicalRot.y + rawError.y, physicalRot.z + rawError.z);
            calCube.rotation.set(physicalRot.x + calError.x, physicalRot.y + calError.y, physicalRot.z + calError.z);

            const rawDeg = { x: normalizeAngle(rawCube.rotation.x), y: normalizeAngle(rawCube.rotation.y), z: normalizeAngle(rawCube.rotation.z) };
            const calDeg = { x: normalizeAngle(calCube.rotation.x), y: normalizeAngle(calCube.rotation.y), z: normalizeAngle(calCube.rotation.z) };
            const errDeg = { x: rawDeg.x - normalizeAngle(physicalRot.x), y: rawDeg.y - normalizeAngle(physicalRot.y), z: rawDeg.z - normalizeAngle(physicalRot.z) };
            const calErrDeg = { x: calDeg.x - normalizeAngle(physicalRot.x), y: calDeg.y - normalizeAngle(physicalRot.y), z: calDeg.z - normalizeAngle(physicalRot.z) };

            document.getElementById('raw-x').innerText = formatDeg(rawDeg.x);
            document.getElementById('raw-y').innerText = formatDeg(rawDeg.y);
            document.getElementById('raw-z').innerText = formatDeg(rawDeg.z);
            document.getElementById('err-x').innerText = formatErr(errDeg.x);
            document.getElementById('err-y').innerText = formatErr(errDeg.y);
            document.getElementById('err-z').innerText = formatErr(errDeg.z);

            document.getElementById('cal-x').innerText = formatDeg(calDeg.x);
            document.getElementById('cal-y').innerText = formatDeg(calDeg.y);
            document.getElementById('cal-z').innerText = formatDeg(calDeg.z);
            document.getElementById('cal-err-x').innerText = formatErr(calErrDeg.x);
            document.getElementById('cal-err-y').innerText = formatErr(calErrDeg.y);
            document.getElementById('cal-err-z').innerText = formatErr(calErrDeg.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = animate;
    </script>
</body>
</html>
