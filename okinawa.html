<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>第 3 頁｜為什麼選擇沖繩編輯力</title>
  <style>
    :root {
      --yellow: #ffe86a;
      --paper: #fffdf4;
      --ink: #111111;
      --muted: #55514a;
      --cream: #f2f0e8;
      --accent: #f8d948;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #181818;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
    }

    .slide {
      position: relative;
      width: min(100vw, 1600px);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--yellow);
      isolation: isolate;
      padding: 4.2% 5.2% 4.4%;
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: auto -7% -20% -5%;
      height: 46%;
      background: var(--cream);
      border: 3px solid var(--ink);
      border-radius: 54% 46% 0 0 / 42% 38% 0 0;
      transform: rotate(-2deg);
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 30%;
      aspect-ratio: 1;
      right: -7%;
      top: -6%;
      background: transparent;
      border: 3px solid var(--ink);
      clip-path: polygon(50% 0%, 59% 34%, 93% 18%, 69% 47%, 100% 61%, 64% 62%, 70% 100%, 49% 70%, 22% 96%, 31% 60%, 0% 52%, 33% 43%, 18% 8%, 45% 34%);
      opacity: .95;
      z-index: -1;
    }

    .page-tag {
      position: absolute;
      top: 4.4%;
      left: 4.4%;
      width: 10.5%;
      height: 8%;
      display: grid;
      place-items: center;
      background: var(--accent);
      border: 3px solid var(--ink);
      border-radius: 48% 52% 43% 57% / 58% 41% 59% 42%;
      transform: rotate(-3deg);
      font-size: clamp(15px, 1.6vw, 26px);
      font-weight: 900;
      letter-spacing: .08em;
    }

    .title-paper {
      position: absolute;
      top: 4.8%;
      left: 16.5%;
      width: 58%;
      height: 18%;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 50% 48% 46% 54% / 9% 12% 14% 11%;
      transform: rotate(.7deg);
      padding: 2.1% 3.2%;
      box-shadow: 7px 8px 0 rgba(0,0,0,.08);
    }

    .kicker {
      font-size: clamp(13px, 1.15vw, 19px);
      font-weight: 800;
      color: var(--muted);
      letter-spacing: .08em;
      margin-bottom: .5%;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 3.1vw, 52px);
      line-height: 1.12;
      letter-spacing: .03em;
      font-weight: 950;
    }

    .bridge {
      position: absolute;
      top: 27%;
      left: 6%;
      right: 6%;
      display: grid;
      grid-template-columns: 1fr .52fr 1fr;
      align-items: center;
      gap: 1.5%;
    }

    .phase-card {
      min-height: 122px;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 56% 44% 49% 51% / 9% 13% 12% 10%;
      padding: 3.5% 5%;
      box-shadow: 6px 7px 0 rgba(0,0,0,.07);
    }

    .phase-card.past { transform: rotate(-1.8deg); }
    .phase-card.now { transform: rotate(1.3deg); }

    .phase-label {
      display: inline-block;
      background: var(--accent);
      border: 2.5px solid var(--ink);
      border-radius: 50% 48% 44% 56% / 25% 30% 36% 28%;
      padding: .12em .65em .18em;
      margin-bottom: .55em;
      font-size: clamp(15px, 1.45vw, 24px);
      font-weight: 950;
      letter-spacing: .08em;
    }

    .phase-text {
      font-size: clamp(20px, 2.05vw, 34px);
      font-weight: 850;
      line-height: 1.35;
      letter-spacing: .03em;
    }

    .phase-text span {
      color: var(--muted);
      font-weight: 750;
    }

    .center-badge {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 108px;
      background: var(--ink);
      color: var(--yellow);
      border: 4px solid var(--ink);
      border-radius: 47% 53% 42% 58% / 62% 40% 60% 38%;
      transform: rotate(-2deg);
      font-size: clamp(20px, 2vw, 34px);
      font-weight: 950;
      text-align: center;
      letter-spacing: .09em;
      line-height: 1.25;
    }

    .center-badge::before,
    .center-badge::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 34%;
      border-top: 4px solid var(--ink);
    }

    .center-badge::before { right: 100%; transform: translateY(-50%) rotate(1deg); }
    .center-badge::after { left: 100%; transform: translateY(-50%) rotate(-1deg); }

    .method-strip {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 48.5%;
      height: 9.2%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      gap: 1%;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 50% 48% 49% 51% / 14% 22% 18% 16%;
      transform: rotate(.4deg);
      padding: 1.1% 1.7%;
      box-shadow: 6px 7px 0 rgba(0,0,0,.07);
    }

    .method-item {
      position: relative;
      text-align: center;
      font-size: clamp(17px, 1.65vw, 28px);
      font-weight: 900;
      letter-spacing: .05em;
      white-space: nowrap;
    }

    .method-item:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -9%;
      top: 50%;
      transform: translateY(-50%) rotate(-2deg);
      font-size: 1.1em;
      font-weight: 950;
    }

    .evidence-zone {
      position: absolute;
      left: 5.8%;
      right: 5.8%;
      bottom: 5.6%;
      height: 32%;
      display: grid;
      grid-template-columns: 68% 29%;
      gap: 3%;
      align-items: stretch;
    }

    .ability-map {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3.5% 3%;
      align-content: center;
    }

    .map-row {
      display: grid;
      grid-template-columns: 33% 67%;
      align-items: center;
      min-height: 50px;
    }

    .skill {
      justify-self: start;
      background: var(--accent);
      border: 2.5px solid var(--ink);
      border-radius: 44% 56% 48% 52% / 22% 36% 28% 36%;
      padding: .26em .75em;
      font-size: clamp(14px, 1.35vw, 22px);
      font-weight: 950;
      letter-spacing: .04em;
      transform: rotate(-1.5deg);
      white-space: nowrap;
    }

    .site {
      background: var(--paper);
      border: 2.5px solid var(--ink);
      border-radius: 52% 47% 48% 53% / 18% 12% 16% 14%;
      padding: .35em .8em .42em;
      font-size: clamp(14px, 1.25vw, 21px);
      font-weight: 850;
      letter-spacing: .02em;
      transform: rotate(.5deg);
      white-space: nowrap;
    }

    .summary-paper {
      position: relative;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 52% 48% 51% 49% / 9% 16% 13% 11%;
      padding: 8.5% 7.5%;
      transform: rotate(1.6deg);
      box-shadow: 7px 8px 0 rgba(0,0,0,.08);
    }

    .summary-paper::before {
      content: "官方計畫對應";
      position: absolute;
      left: 7%;
      top: -8%;
      background: var(--accent);
      border: 2.5px solid var(--ink);
      border-radius: 49% 51% 43% 57% / 36% 28% 40% 24%;
      padding: .25em .75em;
      font-size: clamp(13px, 1.1vw, 18px);
      font-weight: 950;
      letter-spacing: .05em;
      transform: rotate(-3deg);
    }

    .summary-paper p {
      margin: 0;
      font-size: clamp(14px, 1.22vw, 21px);
      line-height: 1.72;
      font-weight: 760;
      color: #24211c;
      letter-spacing: .03em;
    }

    .underline {
      background-image: linear-gradient(transparent 62%, rgba(248,217,72,.75) 62%);
      padding: 0 .05em;
      font-weight: 950;
    }

    .doodle-line {
      position: absolute;
      left: 5.8%;
      bottom: 39.2%;
      width: 19%;
      height: 3%;
      border-bottom: 3px solid var(--ink);
      border-radius: 50%;
      transform: rotate(4deg);
      opacity: .9;
    }

    .pebbles {
      position: absolute;
      right: 5.5%;
      bottom: 2.8%;
      width: 15%;
      height: 7%;
      opacity: .95;
    }

    .pebbles span {
      position: absolute;
      display: block;
      background: var(--cream);
      border: 2.5px solid var(--ink);
      border-radius: 49% 51% 45% 55% / 52% 45% 55% 48%;
    }

    .pebbles span:nth-child(1) { width: 26%; height: 58%; left: 0; bottom: 0; }
    .pebbles span:nth-child(2) { width: 18%; height: 42%; left: 27%; bottom: 20%; }
    .pebbles span:nth-child(3) { width: 25%; height: 70%; left: 45%; bottom: 5%; }
    .pebbles span:nth-child(4) { width: 29%; height: 90%; right: 0; bottom: 0; }

    @media (max-width: 900px) {
      .slide {
        width: 100vw;
      }
    }
  </style>
</head>
<body>
  <main class="slide" aria-label="第 3 頁：為什麼選擇沖繩編輯力">
    <div class="page-tag">第 3 頁</div>

    <section class="title-paper">
      <div class="kicker">為什麼選擇沖繩編輯力</div>
      <h1>從設計力，推進到地方編輯力</h1>
    </section>

    <section class="bridge" aria-label="從過去到現在的轉換">
      <div class="phase-card past">
        <div class="phase-label">過去</div>
        <div class="phase-text">地方素材 <span>→</span><br>商品、品牌、活動</div>
      </div>

      <div class="center-badge">補上<br>編輯力</div>

      <div class="phase-card now">
        <div class="phase-label">現在</div>
        <div class="phase-text">地方記憶 <span>→</span><br>可閱讀、可保存、可傳播</div>
      </div>
    </section>

    <section class="method-strip" aria-label="學習沖繩方法">
      <div class="method-item">田野採集</div>
      <div class="method-item">產業分析</div>
      <div class="method-item">歷史轉譯</div>
      <div class="method-item">南方編輯手帖</div>
    </section>

    <div class="doodle-line" aria-hidden="true"></div>

    <section class="evidence-zone" aria-label="對接我的能力與官方計畫路徑">
      <div class="ability-map">
        <div class="map-row">
          <div class="skill">工藝設計</div>
          <div class="site">→ 讀谷村陶藝</div>
        </div>
        <div class="map-row">
          <div class="skill">社區分析</div>
          <div class="site">→ 糸滿觀光</div>
        </div>
        <div class="map-row">
          <div class="skill">品牌策展</div>
          <div class="site">→ cafe MONDOOR</div>
        </div>
        <div class="map-row">
          <div class="skill">刊物編排</div>
          <div class="site">→ Urara／出版社協會</div>
        </div>
        <div class="map-row">
          <div class="skill">議題轉譯</div>
          <div class="site">→ 姬百合／沖繩藝大</div>
        </div>
        <div class="map-row">
          <div class="skill">圖文整理</div>
          <div class="site">→ 南方編輯手帖</div>
        </div>
      </div>

      <aside class="summary-paper">
        <p>
          從 <span class="underline">やちむん之里</span>、糸滿觀光、姬百合資料館、Urara／出版社協會，
          到最後整合全期採集成果為 <span class="underline">圖文排版與成果發表</span>，
          正好對應這條「設計力到編輯力」的路徑。
        </p>
      </aside>
    </section>

    <div class="pebbles" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </main>
</body>
</html>
